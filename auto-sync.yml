name: 自动同步上游仓库

# 触发条件：每天UTC时间0点运行，也可手动触发
on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨执行
  workflow_dispatch:     # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 克隆当前Fork仓库
      - name:  checkout 代码
        uses: actions/checkout@v4
        with:
          ref: main  # DODBOY888/PG
          fetch-depth: 0  # 获取完整历史

      # 2. 添加上游仓库（原仓库地址）
      - name: 设置上游仓库
        run: |
          git remote add upstream https://github.com/fish2018/PG.git  # 替换为上游仓库地址
          git fetch upstream

      # 3. 合并上游仓库的更改到当前分支
      - name: 合并上游更改
        run: |
          git checkout main  # 切换到你的主分支
          git merge upstream/main  # 合并上游主分支的更改

      # 4. 推送更新到Fork仓库
      - name: 推送更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git push origin main  # 推送到你的Fork仓库主分支
